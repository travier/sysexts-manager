name: "Build buildroot container image for CI"

env:
  NAME: "${{ github.event.repository.name }}/buildroot"
  REGISTRY: "ghcr.io/${{ github.repository_owner }}"

on:
  pull_request:
    branches:
      - "main"
    paths:
      - '.github/Containerfile.buildroot'
      - '.github/workflows/buildroot.yml'
  push:
    branches:
      - "main"
    paths:
      - '.github/Containerfile.buildroot'
      - '.github/workflows/buildroot.yml'
  schedule:
    - cron:  '0 0 * * MON'
  workflow_dispatch:

# Allow read access to the repo content
permissions:
  contents: read

# Prevent multiple workflow runs from racing to ensure that pushes are made
# sequentialy for the main branch. Also cancel in progress workflow runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-x86_64:
    runs-on: "ubuntu-24.04"
    # Allow write access to packages to allow access to GitHub container registry
    permissions:
      packages: write
    steps:
      - name: "Checkout repo"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: "Build container image"
        uses: redhat-actions/buildah-build@7a95fa7ee0f02d552a32753e7414641a04307056 # v2.13
        with:
          context: .github
          image: ${{ env.NAME }}
          tags: latest-x86_64
          containerfiles: .github/Containerfile.buildroot
          oci: true

      - name: "Push to Container Registry"
        uses: redhat-actions/push-to-registry@5ed88d269cf581ea9ef6dd6806d01562096bee9c # v2.8
        id: push
        if: (github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          image: ${{ env.NAME }}
          tags: latest-x86_64

  build-aarch64:
    runs-on: "ubuntu-24.04-arm"
    # Allow write access to packages to allow access to GitHub container registry
    permissions:
      packages: write
    steps:
      - name: "Checkout repo"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: "Build container image"
        uses: redhat-actions/buildah-build@7a95fa7ee0f02d552a32753e7414641a04307056 # v2.13
        with:
          context: .github
          image: ${{ env.NAME }}
          tags: latest-aarch64
          containerfiles: .github/Containerfile.buildroot
          oci: true

      - name: "Push to Container Registry"
        uses: redhat-actions/push-to-registry@5ed88d269cf581ea9ef6dd6806d01562096bee9c # v2.8
        id: push
        if: (github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          image: ${{ env.NAME }}
          tags: latest-aarch64

  merge:
    runs-on: "ubuntu-24.04"
    needs:
      - build-x86_64
      - build-aarch64
    # Allow write access to packages to allow access to GitHub container registry
    permissions:
      packages: write
    steps:
      - name: "Create multi-arch manifest"
        if: (github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euxo pipefail
          buildah manifest create "${REGISTRY}/${NAME}:latest" \
            "${REGISTRY}/${NAME}:latest-x86_64" \
            "${REGISTRY}/${NAME}:latest-aarch64"

      - name: "Push to Container Registry"
        uses: redhat-actions/push-to-registry@5ed88d269cf581ea9ef6dd6806d01562096bee9c # v2.8
        id: push
        if: (github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          image: ${{ env.NAME }}
          tags: latest
